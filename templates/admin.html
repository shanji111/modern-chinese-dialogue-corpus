<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>后台管理 - 汉语对话语料库</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body class="admin-page">
    <main class="admin-container admin-dashboard-container">
        <header class="admin-dashboard-header">
            <div>
                <div class="admin-title">后台管理</div>
                <div class="admin-subtitle">请选择需要进行的管理操作</div>
            </div>
            <a href="{{ url_for('admin_logout') }}" class="admin-dashboard-logout">退出登录</a>
        </header>

        <nav class="admin-dashboard-grid" aria-label="后台管理功能">
            <a href="{{ url_for('admin_entry') }}" class="admin-dashboard-card admin-dashboard-card-entry">
                <span class="admin-dashboard-index" aria-hidden="true">01</span>
                <div>
                    <h2>提交数据</h2>
                    <p>录入新的语料条目，补充来源、年份、分类和正文信息。</p>
                </div>
                <span class="admin-dashboard-enter">进入功能 <span aria-hidden="true">→</span></span>
            </a>

            <a href="{{ url_for('admin_list') }}" class="admin-dashboard-card admin-dashboard-card-data">
                <span class="admin-dashboard-index" aria-hidden="true">02</span>
                <div>
                    <h2>查看已有数据</h2>
                    <p>浏览数据库中的语料条目，核对来源、年份与分类信息。</p>
                </div>
                <span class="admin-dashboard-enter">进入功能 <span aria-hidden="true">→</span></span>
            </a>

            <a href="{{ url_for('admin_submissions') }}" class="admin-dashboard-card admin-dashboard-card-review">
                <span class="admin-dashboard-index" aria-hidden="true">03</span>
                <div>
                    <h2>审核投稿</h2>
                    <p>查看用户提交的材料，执行内容审核、转写、通过或驳回处理。</p>
                </div>
                <span class="admin-dashboard-enter">进入功能 <span aria-hidden="true">→</span></span>
            </a>

            <a href="{{ url_for('admin_visitors') }}" class="admin-dashboard-card admin-dashboard-card-security">
                <span class="admin-dashboard-index" aria-hidden="true">04</span>
                <div>
                    <h2>访问统计与安全</h2>
                    <p>查看访客趋势与历史快照，并维护 IP 安全记录和封禁名单。</p>
                </div>
                <span class="admin-dashboard-enter">进入功能 <span aria-hidden="true">→</span></span>
            </a>
        </nav>
    </main>
</body>
</html>
